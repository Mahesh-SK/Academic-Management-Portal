<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="Registration.css">
</head>

<body>

    <div id="registerdiv1">
        <form action="">
            <h1>Registration Page</h1>
            <div>
                <label for="">Username</label><br>
                <input type="text" id="user" placeholder="Enter the Username...">
                <span id="uerror" class="error"></span>
            </div><br>

            <div>
                <label for="">Password</label><br>
                <input type="text" id="pass" placeholder="Enter the Password...">
                <span id="perror" class="error"></span>
            </div><br>

            <div>
                <label for="">Confirm-password</label><br>
                <input type="text" id="cpass" placeholder="Enter the Confirm-password...">
                <span id="cperror" class="error"></span>
            </div><br>

            <div>
                <label for="">E-mail</label><br>
                <input type="text" id="mail" placeholder="Enter the mail...">
                <span id="merror" class="error"></span>
            </div><br>

            <div>
                <label for="">Mobile Number</label><br>
                <input type="text" id="num" placeholder="Enter the number...">
                <span id="nerror" class="error"></span>
            </div><br>

            <div>
                <button id="btn1">Register</button>
                <button id="btn2">Cancel</button>
            </div><br>

            <div>
                Already have an account?<a href="../Login/Login.html">Login</a>
            </div>
        </form>
    </div>
    <script src="Registration.js"></script>
</body>

</html>
