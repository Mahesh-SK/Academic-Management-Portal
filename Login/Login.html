<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="Login.css">
</head>

<body>

    <div id="logindiv2">
        <form action="">
            <h1>Login</h1>
            <div>
                <label for="">Username</label><br>
                <input type="text" id="user" placeholder="Enter the Username..."
                    style="width: 270px; height: 25px; background-color:  rgb(240, 235, 235);">
                <span id="uerror" class="error"></span>
            </div><br>

            <div>
                <label for="">Password</label><br>
                <input type="text" id="pass" placeholder="Enter the Password..."
                    style="width: 270px; height: 25px; background-color:  rgb(240, 235, 235);">
                <span id="perror" class="error"></span>
            </div>

            <input id="rem" type="checkbox"> Remember me <br><br>

            <button id="btn">Login</button><br>

            Don't have an account &nbsp ? &nbsp<a href="../Registration/Registration.html"> Register </a>

            <br><br>

            <a href="" id="a1">ForgotPassword</a>

        </form>
    </div>
    <script src="../Login/Login.js"></script>
</body>

</html>
