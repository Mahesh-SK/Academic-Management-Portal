<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
    <link rel="stylesheet" href="Login.css">
</head>

<body>

    <div id="logindiv2">
        <form>
            <h1>Login</h1>

            <div>
                <label>Username</label><br>
                <input type="text" id="user" class="input" placeholder="Enter the Username...">
                <span id="uerror" class="error"></span>
            </div><br>

            <div>
                <label>Password</label><br>
                <input type="text" id="pass" class="input" placeholder="Enter the Password...">
                <span id="perror" class="error"></span>
            </div><br>

            <div style="width:100%; text-align:left;">
                <input id="rem" type="checkbox"> Remember me
            </div><br>

            <button id="btn">Login</button><br><br>

            Don't have an account?
            <a href="../Registration/Registration.html">Register</a>

            <br><br>

            <a href="#" id="a1">Forgot Password</a>

        </form>
    </div>

    <script src="../Login/Login.js"></script>
</body>

</html>
