<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Welcome</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            height: 100vh;
            background: linear-gradient(45deg, #0856e7, #eff1f4, #0957de);
            font-family: serif;
        }

        #container {
            display: flex;
            align-items: center;
            justify-content: space-between;
            height: 100vh;
            padding: 50px;
        }

        /* LEFT IMAGE */
        #left img {
            width: 350px;
        }

        /* RIGHT CONTENT */
        #right {
            margin-bottom: 400px;
            margin-right: 100px;
            text-align: center;
            flex: 1;
        }

        #right h1 {
            font-size: 50px;
            font-weight: normal;
        }

        #right button {
            margin-top: 20px;
            padding: 10px 30px;
            font-size: 18px;
            border-radius: 10px;
            border: 2px solid black;
            background: lightgray;
            cursor: pointer;
        }

        #right button:hover {
            background: #53adf7;
            box-shadow: 0 0 5px #0e0d07,
                0 0 25px #f6e05e,
                0 0 50px #f6e05e,
                0 0 200px #f6e05e;
        }

        /* MOBILE */
        @media (max-width: 768px) {
            #container {
                flex-direction: column;
                text-align: center;
            }

            #left img {
                width: 250px;
                align-items: center;
            }

            #right h1 {
                font-size: 35px;
                align-items: center;
            }
        }
    </style>
</head>

<body>

    <div id="container">

        <div id="left">
            <img src="ChatGPT Image Mar 12, 2026, 05_52_58 PM.png">
        </div>
   
        <div id="right">
            <h1>
                WELCOME <br>
                TO <br>
                ACADEMIC MANAGEMENT PORTAL
            </h1>

            <a href="../Registration/Registration.html">
                <button>Click Here</button>
            </a>
        </div>

    </div>

</body>

</html>
